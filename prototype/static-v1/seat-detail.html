<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位详情 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand navbar-user">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="index.html">📚 座位预约</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="user-display">当前：<strong>学生A</strong></span>
      </div>
    </div>
  </nav>
  <div class="bg-white border-bottom">
    <div class="page-container d-flex gap-3 py-2">
      <a href="index.html" class="text-decoration-none" style="color:#64748B;">首页</a>
      <a href="seats.html" class="text-decoration-none fw-semibold" style="color:#2563EB;">座位列表</a>
      <a href="my-reservations.html" class="text-decoration-none" style="color:#64748B;">我的预约</a>
    </div>
  </div>

  <div class="page-container">
    <a href="seats.html" class="text-decoration-none mb-3 d-inline-block" style="color:var(--color-text-secondary);font-size:14px;">&larr; 返回座位列表</a>

    <!-- 座位信息卡片 -->
    <div class="card-custom-static mb-3">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h5 class="fw-bold mb-1">A-01 座位</h5>
          <p class="mb-1" style="color:var(--color-text-secondary);font-size:14px;">自习区 · 1F</p>
          <span class="badge-status badge-available badge-lg">空闲</span>
        </div>
        <div class="text-end">
          <div style="font-size:12px;color:var(--color-text-secondary);">座位编号</div>
          <div class="fw-semibold">A-01</div>
        </div>
      </div>
    </div>

    <!-- 预约按钮 -->
    <a href="reservation-create.html" class="btn-custom-primary btn-custom-block text-center text-decoration-none mb-3">预约此座位</a>

    <!-- 今日预约时段 -->
    <div class="card-custom-static">
      <h6 class="fw-bold mb-3">📅 今日预约时段</h6>

      <div class="time-slot-item">
        <span class="slot-time">08:00 - 09:00</span>
        <span class="badge-status badge-completed">已完成</span>
      </div>
      <div class="time-slot-item">
        <span class="slot-time">09:00 - 10:00</span>
        <span class="badge-status badge-cancelled">已取消</span>
      </div>
      <div class="time-slot-item">
        <span class="slot-time">10:00 - 12:00</span>
        <span class="badge-status badge-inuse">使用中</span>
      </div>
      <div class="time-slot-item">
        <span class="slot-time">13:00 - 14:30</span>
        <span class="badge-status badge-pending">待开始</span>
      </div>
      <div class="time-slot-item">
        <span class="slot-time">14:30 - 16:00</span>
        <span style="color:var(--color-success);font-size:13px;font-weight:500;">✅ 空闲</span>
      </div>
      <div class="time-slot-item">
        <span class="slot-time">16:00 - 18:00</span>
        <span style="color:var(--color-success);font-size:13px;font-weight:500;">✅ 空闲</span>
      </div>
      <div class="time-slot-item">
        <span class="slot-time">18:00 - 20:00</span>
        <span style="color:var(--color-success);font-size:13px;font-weight:500;">✅ 空闲</span>
      </div>
    </div>

    <!-- 维护中示例（注释说明：当座位为 Maintenance 时不显示预约按钮） -->
    <div class="card-custom-static mt-3" style="background:#FFF7ED;">
      <p class="mb-0" style="font-size:13px;color:#9A3412;">
        ⚠️ 注：当座位状态为"维护中"时，"预约此座位"按钮将不显示，并显示提示"该座位维护中，暂不可预约"。
      </p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
