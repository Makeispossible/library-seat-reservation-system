<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background:#F1F5F9;">
  <div class="login-card card-custom-static">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">🔐</div>
      <h5 class="fw-bold mt-2">管理员登录</h5>
      <p style="color:var(--color-text-secondary);font-size:14px;">图书馆座位预约管理系统</p>
    </div>

    <!-- 错误提示示例 -->
    <div class="alert-custom-error mb-3" id="errorMsg" style="display:none;">
      ❌ 用户名或密码错误，请重试。
    </div>

    <form onsubmit="return handleLogin(event)">
      <div class="mb-3">
        <label class="form-label-custom">用户名</label>
        <input class="form-custom w-100" type="text" placeholder="请输入管理员账号" id="username">
      </div>
      <div class="mb-3">
        <label class="form-label-custom">密码</label>
        <input class="form-custom w-100" type="password" placeholder="请输入密码" id="password">
      </div>
      <div class="mb-3" style="font-size:13px;color:var(--color-text-secondary);">
        演示账号：admin / admin123
      </div>
      <button type="submit" class="btn-custom-primary btn-custom-block">登 录</button>
    </form>

    <div class="text-center mt-3">
      <a href="index.html" class="text-decoration-none" style="font-size:13px;color:var(--color-text-secondary);">&larr; 返回首页</a>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      var user = document.getElementById('username').value;
      var pwd = document.getElementById('password').value;
      if (user === 'admin' && pwd === 'admin123') {
        window.location.href = 'admin-reservations.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
      return false;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
