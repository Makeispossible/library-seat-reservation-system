<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的预约 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand navbar-user">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="index.html">📚 座位预约</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="user-display">当前：<strong>学生A</strong></span>
      </div>
    </div>
  </nav>
  <div class="bg-white border-bottom">
    <div class="page-container d-flex gap-3 py-2">
      <a href="index.html" class="text-decoration-none" style="color:#64748B;">首页</a>
      <a href="seats.html" class="text-decoration-none" style="color:#64748B;">座位列表</a>
      <a href="my-reservations.html" class="text-decoration-none fw-semibold" style="color:#2563EB;">我的预约</a>
    </div>
  </div>

  <div class="page-container">
    <h5 class="section-title">📋 我的预约</h5>

    <!-- 成功提示 -->
    <div class="alert-custom-success mb-3" id="successAlert">
      ✅ 预约成功！座位 A-02，时段 14:00-16:00
    </div>

    <!-- 预约列表 -->
    <div class="d-flex flex-column gap-3" id="reservationList">
      <div class="reservation-card" data-id="1">
        <div class="rc-top">
          <div>
            <div class="rc-seat">A-02 座位</div>
            <div class="rc-meta">自习区 · 1F</div>
          </div>
          <span class="badge-status badge-pending">待开始</span>
        </div>
        <div class="rc-time">📅 2026-07-14 &nbsp; ⏰ 14:00 - 16:00</div>
        <div class="mt-2">
          <button class="btn-custom-danger btn-custom-sm" onclick="cancelReservation(this)">取消预约</button>
        </div>
      </div>

      <div class="reservation-card" data-id="2">
        <div class="rc-top">
          <div>
            <div class="rc-seat">B-03 座位</div>
            <div class="rc-meta">研讨区 · 2F</div>
          </div>
          <span class="badge-status badge-completed">已完成</span>
        </div>
        <div class="rc-time">📅 2026-07-13 &nbsp; ⏰ 10:00 - 12:00</div>
        <div class="mt-2">
          <button class="btn-custom-outline btn-custom-sm" disabled style="opacity:0.5;">已结束</button>
        </div>
      </div>

      <div class="reservation-card" data-id="3">
        <div class="rc-top">
          <div>
            <div class="rc-seat">C-01 座位</div>
            <div class="rc-meta">静音区 · 3F</div>
          </div>
          <span class="badge-status badge-cancelled">已取消</span>
        </div>
        <div class="rc-time">📅 2026-07-12 &nbsp; ⏰ 09:00 - 11:00</div>
        <div class="mt-2">
          <button class="btn-custom-outline btn-custom-sm" disabled style="opacity:0.5;">已取消</button>
        </div>
      </div>
    </div>

    <!-- 空状态示例（注释说明） -->
    <div class="card-custom-static mt-3" style="background:#FFF7ED;">
      <p class="mb-0" style="font-size:13px;color:#9A3412;">
        📌 空状态预览：当用户无任何预约记录时，显示以下内容：
      </p>
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📋</div>
      <h6>暂无预约记录</h6>
      <p>你还没有预约任何座位，快去预约吧！</p>
      <a href="seats.html" class="btn-custom-primary btn-custom-sm text-decoration-none">去预约</a>
    </div>

    <!-- 底部提示 -->
    <div class="mt-3">
      <a href="seats.html" class="btn-custom-outline btn-custom-block text-center text-decoration-none">继续预约</a>
    </div>
  </div>

  <script>
    function cancelReservation(btn) {
      if (confirm('确定要取消这个预约吗？')) {
        var card = btn.closest('.reservation-card');
        card.querySelector('.rc-top .badge-status').className = 'badge-status badge-cancelled';
        card.querySelector('.rc-top .badge-status').textContent = '已取消';
        btn.textContent = '已取消';
        btn.className = 'btn-custom-outline btn-custom-sm';
        btn.disabled = true;
        btn.style.opacity = '0.5';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
