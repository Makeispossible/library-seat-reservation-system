<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位列表 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 用户端导航栏 -->
  <nav class="navbar navbar-expand navbar-user">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="index.html">📚 座位预约</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="user-display">当前：<strong>学生A</strong></span>
      </div>
    </div>
  </nav>

  <!-- 导航标签 -->
  <div class="bg-white border-bottom">
    <div class="page-container d-flex gap-3 py-2">
      <a href="index.html" class="text-decoration-none" style="color:#64748B;">首页</a>
      <a href="seats.html" class="text-decoration-none fw-semibold" style="color:#2563EB;">座位列表</a>
      <a href="my-reservations.html" class="text-decoration-none" style="color:#64748B;">我的预约</a>
    </div>
  </div>

  <div class="page-container">
    <h5 class="section-title">🪑 座位列表</h5>

    <!-- 筛选区 -->
    <div class="card-custom-static mb-3">
      <div class="row g-2">
        <div class="col-6">
          <label class="form-label-custom">区域</label>
          <select class="form-custom w-100">
            <option>全部区域</option>
            <option>自习区</option>
            <option>研讨区</option>
            <option>静音区</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label-custom">楼层</label>
          <select class="form-custom w-100">
            <option>全部楼层</option>
            <option>1F</option>
            <option>2F</option>
            <option>3F</option>
          </select>
        </div>
      </div>
      <button class="btn-custom-primary btn-custom-sm mt-2">筛选</button>
    </div>

    <!-- 座位网格 -->
    <div class="row g-3" id="seatGrid">
      <!-- 自习区 1F -->
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-available">
          <h6>A-01</h6>
          <div class="seat-meta">自习区 · 1F</div>
          <span class="badge-status badge-available">空闲</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-reserved">
          <h6>A-02</h6>
          <div class="seat-meta">自习区 · 1F</div>
          <span class="badge-status badge-reserved">已预约</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-maintenance">
          <h6>A-03</h6>
          <div class="seat-meta">自习区 · 1F</div>
          <span class="badge-status badge-maintenance">维护中</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-inuse">
          <h6>A-04</h6>
          <div class="seat-meta">自习区 · 1F</div>
          <span class="badge-status badge-inuse">使用中</span>
        </a>
      </div>

      <!-- 研讨区 2F -->
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-available">
          <h6>B-01</h6>
          <div class="seat-meta">研讨区 · 2F</div>
          <span class="badge-status badge-available">空闲</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-available">
          <h6>B-02</h6>
          <div class="seat-meta">研讨区 · 2F</div>
          <span class="badge-status badge-available">空闲</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-reserved">
          <h6>B-03</h6>
          <div class="seat-meta">研讨区 · 2F</div>
          <span class="badge-status badge-reserved">已预约</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-maintenance">
          <h6>B-04</h6>
          <div class="seat-meta">研讨区 · 2F</div>
          <span class="badge-status badge-maintenance">维护中</span>
        </a>
      </div>

      <!-- 静音区 3F -->
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-available">
          <h6>C-01</h6>
          <div class="seat-meta">静音区 · 3F</div>
          <span class="badge-status badge-available">空闲</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-inuse">
          <h6>C-02</h6>
          <div class="seat-meta">静音区 · 3F</div>
          <span class="badge-status badge-inuse">使用中</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-available">
          <h6>C-03</h6>
          <div class="seat-meta">静音区 · 3F</div>
          <span class="badge-status badge-available">空闲</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-3">
        <a href="seat-detail.html" class="seat-card seat-card-reserved">
          <h6>C-04</h6>
          <div class="seat-meta">静音区 · 3F</div>
          <span class="badge-status badge-reserved">已预约</span>
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
