<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据统计 - 管理员</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand navbar-admin">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="admin-reservations.html">📊 管理后台</a>
      <div class="d-flex gap-2">
        <a href="admin-reservations.html" class="nav-link">预约管理</a>
        <a href="admin-seats.html" class="nav-link">座位管理</a>
        <a href="admin-stats.html" class="nav-link active">统计</a>
        <a href="admin-login.html" class="nav-link">退出</a>
      </div>
    </div>
  </nav>

  <div class="page-container admin-container-wide">
    <h5 class="section-title">📊 数据统计</h5>

    <!-- 数据卡片 -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="stats-card">
          <div class="stats-number">12</div>
          <div class="stats-label">座位总数</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stats-card">
          <div class="stats-number">8</div>
          <div class="stats-label">今日预约</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stats-card">
          <div class="stats-number">58<span class="stats-unit">%</span></div>
          <div class="stats-label">座位使用率</div>
          <div class="progress-custom mt-2">
            <div class="progress-bar-fill" style="width:58%;background:var(--color-primary);"></div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stats-card">
          <div class="stats-number">4</div>
          <div class="stats-label">当前使用中</div>
        </div>
      </div>
    </div>

    <!-- 详细数据 -->
    <div class="row g-3">
      <!-- 区域分布 -->
      <div class="col-12 col-md-6">
        <div class="card-custom-static">
          <h6 class="fw-bold mb-3">📍 区域分布</h6>
          <table class="table-custom">
            <thead>
              <tr>
                <th>区域</th>
                <th>座位数</th>
                <th>今日预约</th>
                <th>使用率</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>自习区</td>
                <td>4</td>
                <td>3</td>
                <td>75%</td>
              </tr>
              <tr>
                <td>研讨区</td>
                <td>4</td>
                <td>2</td>
                <td>50%</td>
              </tr>
              <tr>
                <td>静音区</td>
                <td>4</td>
                <td>3</td>
                <td>75%</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 可用/维护中 -->
      <div class="col-12 col-md-6">
        <div class="card-custom-static">
          <h6 class="fw-bold mb-3">🔧 座位状态概况</h6>
          <table class="table-custom">
            <thead>
              <tr>
                <th>状态</th>
                <th>数量</th>
                <th>占比</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><span class="badge-status badge-available">可用</span></td>
                <td>8</td>
                <td>67%</td>
              </tr>
              <tr>
                <td><span class="badge-status badge-maintenance">维护中</span></td>
                <td>2</td>
                <td>17%</td>
              </tr>
              <tr>
                <td><span class="badge-status badge-inuse">使用中</span></td>
                <td>4</td>
                <td>33%</td>
              </tr>
              <tr>
                <td><span class="badge-status badge-reserved">已预约</span></td>
                <td>2</td>
                <td>17%</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 今日时段分布 -->
    <div class="card-custom-static mt-3">
      <h6 class="fw-bold mb-3">⏰ 今日预约时段分布</h6>
      <div class="table-responsive-custom">
        <table class="table-custom">
          <thead>
            <tr>
              <th>时段</th>
              <th>预约数</th>
              <th>占用率</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>08:00-10:00</td>
              <td>1</td>
              <td><div class="progress-custom" style="height:6px;max-width:200px;"><div class="progress-bar-fill" style="width:12%;background:#3B82F6;"></div></div></td>
            </tr>
            <tr>
              <td>10:00-12:00</td>
              <td>3</td>
              <td><div class="progress-custom" style="height:6px;max-width:200px;"><div class="progress-bar-fill" style="width:38%;background:#22C55E;"></div></div></td>
            </tr>
            <tr>
              <td>13:00-15:00</td>
              <td>2</td>
              <td><div class="progress-custom" style="height:6px;max-width:200px;"><div class="progress-bar-fill" style="width:25%;background:#F97316;"></div></div></td>
            </tr>
            <tr>
              <td>15:00-17:00</td>
              <td>2</td>
              <td><div class="progress-custom" style="height:6px;max-width:200px;"><div class="progress-bar-fill" style="width:25%;background:#F97316;"></div></div></td>
            </tr>
            <tr>
              <td>17:00-19:00</td>
              <td>0</td>
              <td><div class="progress-custom" style="height:6px;max-width:200px;"><div class="progress-bar-fill" style="width:0%;"></div></div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
