<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约提交 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand navbar-user">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="index.html">📚 座位预约</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="user-display">当前：<strong>学生A</strong></span>
      </div>
    </div>
  </nav>
  <div class="bg-white border-bottom">
    <div class="page-container d-flex gap-3 py-2">
      <a href="index.html" class="text-decoration-none" style="color:#64748B;">首页</a>
      <a href="seats.html" class="text-decoration-none" style="color:#64748B;">座位列表</a>
      <a href="my-reservations.html" class="text-decoration-none" style="color:#64748B;">我的预约</a>
    </div>
  </div>

  <div class="page-container page-container-sm">
    <a href="seat-detail.html" class="text-decoration-none mb-3 d-inline-block" style="color:var(--color-text-secondary);font-size:14px;">&larr; 返回座位详情</a>

    <h5 class="section-title">📝 预约座位</h5>

    <!-- 座位信息 -->
    <div class="card-custom-static mb-3">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <span class="fw-bold">A-01</span>
          <span class="ms-2" style="color:var(--color-text-secondary);font-size:13px;">自习区 · 1F</span>
        </div>
        <span class="badge-status badge-available">空闲</span>
      </div>
    </div>

    <!-- 预约表单 -->
    <div class="card-custom-static">
      <div class="mb-3">
        <label class="form-label-custom">座位编号</label>
        <input class="form-custom w-100" type="text" value="A-01（自习区 · 1F）" readonly style="background:#f1f5f9;">
      </div>

      <div class="mb-3">
        <label class="form-label-custom">日期</label>
        <input class="form-custom w-100" type="text" value="2026年7月14日" readonly style="background:#f1f5f9;">
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label-custom">开始时间</label>
          <select class="form-custom w-100">
            <option value="">选择时间</option>
            <option>08:00</option>
            <option>09:00</option>
            <option>10:00</option>
            <option>13:00</option>
            <option>14:00</option>
            <option>15:00</option>
            <option>16:00</option>
            <option>17:00</option>
            <option>18:00</option>
            <option>19:00</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label-custom">结束时间</label>
          <select class="form-custom w-100">
            <option value="">选择时间</option>
            <option>09:00</option>
            <option>10:00</option>
            <option>11:00</option>
            <option>12:00</option>
            <option>13:00</option>
            <option>14:00</option>
            <option>15:00</option>
            <option>16:00</option>
            <option>17:00</option>
            <option>18:00</option>
            <option>19:00</option>
            <option>20:00</option>
          </select>
        </div>
      </div>

      <!-- 规则提示 -->
      <div class="mb-3" style="font-size:13px;color:var(--color-text-secondary);">
        <div>⏱ 最短预约 <strong>30 分钟</strong>，最长 <strong>4 小时</strong></div>
        <div>📌 每人每天最多 <strong>1 次有效预约</strong></div>
      </div>

      <!-- 校验错误示例 -->
      <div class="alert-custom-error mb-3" id="errorExample" style="display:none;">
        ❌ 该时段已被预约，请选择其他时段。
      </div>

      <!-- 提交按钮 -->
      <button class="btn-custom-primary btn-custom-block" onclick="showSuccess()">提交预约</button>
    </div>

    <!-- 提交成功示例 -->
    <div class="alert-custom-success mt-3" id="successMessage" style="display:none;">
      ✅ 预约成功！已跳转至"我的预约"页面。
    </div>
  </div>

  <script>
    function showSuccess() {
      document.getElementById('successMessage').style.display = 'block';
      document.getElementById('errorExample').style.display = 'none';
      setTimeout(function() {
        window.location.href = 'my-reservations.html';
      }, 1500);
    }
    function showError() {
      document.getElementById('errorExample').style.display = 'block';
      document.getElementById('successMessage').style.display = 'none';
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
